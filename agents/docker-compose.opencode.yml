version: "3.9"

services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    working_dir: /repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/repo
    environment:
      # Pick your model/provider env vars here (depends on what you use)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Host UI endpoint for posting updates
      AGENT_UI_POST_URL: ${AGENT_UI_POST_URL}

      # your prompt gets injected at runtime
      OPENCODE_PROMPT: >
        You are the resilience/load agent. When you start, call post_update once with a short "startup" message.
        Next call the route-finder tool on http://app:8000 and then call post_update once summarizing how many routes you found.
        Then choose 1 critical post route and call the scale_test tool on it, then call post_update once with the result summary.

    # Automated startup: run opencode in non-interactive mode
    command: ["bash", "-lc", "opencode run --format json \"$OPENCODE_PROMPT\""]
